name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run zip
      - name: Publish GitHub Release
        run: gh release create "$GITHUB_REF_NAME" .output/*-chrome.zip --generate-notes --title "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}

